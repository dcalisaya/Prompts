# LiteLLM Configuration - Local Only (Ollama)
# Para usar con los modelos que ya tienes instalados

model_list:
  # Llama 3.1 8B - Buen balance velocidad/calidad
  - model_name: llama-3.1-8b-ld
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://host.docker.internal:11434
      timeout: 60
      max_tokens: 4096
      temperature: 0.7
    model_info:
      mode: chat
      description: "Llama 3.1 8B - Balance velocidad/calidad"

  # Phi-4 - Microsoft, bueno para razonamiento
  - model_name: phi4-ld
    litellm_params:
      model: ollama/phi4:latest
      api_base: http://host.docker.internal:11434
      timeout: 60
      max_tokens: 4096
      temperature: 0.7
    model_info:
      mode: chat
      description: "Microsoft Phi-4 - Razonamiento y código"

  # Modelo de 20B (gpt-oss:20b)
  - model_name: gpt-oss-20b-ld
    litellm_params:
      model: ollama/gpt-oss:20b
      api_base: http://host.docker.internal:11434
      timeout: 90
      max_tokens: 4096
      temperature: 0.7
    model_info:
      mode: chat
      description: "GPT-OSS 20B - Modelo grande local"

  # Qwen 3.5
  - model_name: qwen-3.5-ld
    litellm_params:
      model: ollama/qwen3.5:latest
      api_base: http://host.docker.internal:11434
      timeout: 60
      max_tokens: 4096
      temperature: 0.7
    model_info:
      mode: chat
      description: "Qwen - Capacidades multilingües"

  # Fallback entre modelos locales si uno falla
  - model_name: default-local
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://host.docker.internal:11434
      timeout: 30
    model_info:
      mode: chat
      description: "Modelo default rápido"

router_settings:
  # Si un modelo está ocupado, usa otro
  routing_strategy: simple-shuffle
  
  # Fallback: si gpt-oss:20b falla, usa llama3.1:8b
  fallback_strategy:
    - gpt-oss-20b-ld: ["llama-3.1-8b-ld"]
    - phi4-ld: ["llama-3.1-8b-ld"]

# Rate limiting para no saturar la Mac
general_settings:
  master_key: sk-ld-local
  database_url: sqlite:///app/data/litellm.db
  
  # Límites por modelo
  user_budget: null  # Sin límite de budget en local
