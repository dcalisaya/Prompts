# Live Developer - Stack Directo (sin LiteLLM)
# Open WebUI conecta directamente a Ollama

services:
  # Open WebUI - Conexión directa a Ollama
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ld-openwebui
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      # Conexión directa a Ollama (sin LiteLLM)
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - ENABLE_OLLAMA_API=true
      - ENABLE_SIGNUP=true
      - DEFAULT_LOCALE=es
      - DEFAULT_MODELS=llama3.1:8b,phi4:latest,qwen3.5:latest,gpt-oss:20b
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  open-webui-data:
