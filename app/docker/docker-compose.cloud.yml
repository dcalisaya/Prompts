# Live Developer - Cloud-Only Edition
# Para VMs sin GPU o cuando prefieres usar solo APIs pagadas
# 
# Esta versión NO requiere Ollama local
# Usa: OpenAI, Anthropic, o cualquier provider compatible con OpenAI API
#
# Uso:
#   cd app/docker
#   docker-compose -f docker-compose.cloud.yml up -d

version: '3.8'

services:
  # LiteLLM Proxy - Router a APIs pagadas
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ld-litellm-cloud
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.cloud.yaml:/app/config.yaml
      - litellm-db-cloud:/app/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DATABASE_URL=sqlite:///app/data/litellm.db
    command: >
      --config /app/config.yaml
      --port 4000
      --num_workers 4
    restart: unless-stopped
    networks:
      - ld-cloud-network

  # Open WebUI - Interfaz para el equipo
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ld-openwebui-cloud
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data-cloud:/app/backend/data
    environment:
      # Sin Ollama - solo APIs pagadas
      - ENABLE_OLLAMA_API=false
      - OPENAI_API_BASE=http://litellm:4000/v1
      - DEFAULT_MODELS=gpt-4o-ld
      - DEFAULT_LOCALE=es
      - ENABLE_SIGNUP=true
      # OAuth opcional (ver abajo)
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID:-}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET:-}
      - OPENID_PROVIDER_URL=${OPENID_PROVIDER_URL:-}
      - OAUTH_SCOPES=${OAUTH_SCOPES:-openid email profile}
    restart: unless-stopped
    networks:
      - ld-cloud-network
    depends_on:
      - litellm

  # API Live Developer (FastAPI)
  ld-api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: ld-api-cloud
    ports:
      - "8000:8000"
    volumes:
      - ../../base/json:/app/data:ro
    environment:
      - DATA_DIR=/app/data
      - LITELLM_URL=http://litellm:4000
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped
    networks:
      - ld-cloud-network
    depends_on:
      - litellm

volumes:
  litellm-db-cloud:
  open-webui-data-cloud:

networks:
  ld-cloud-network:
    driver: bridge
