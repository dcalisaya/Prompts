# Live Developer - Stack Mínimo (sin base de datos)
# LiteLLM en modo stateless

services:
  # LiteLLM Proxy - Sin base de datos
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ld-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.local.yaml:/app/config.yaml
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LITELLM_MASTER_KEY=sk-ld-local
      # Sin DATABASE_URL - modo stateless
    command: >
      --config /app/config.yaml
      --port 4000
      --debug
    restart: unless-stopped
    networks:
      - ld-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Open WebUI
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ld-openwebui
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OPENAI_API_BASE=http://litellm:4000/v1
      - ENABLE_SIGNUP=true
      - DEFAULT_LOCALE=es
      - DEFAULT_MODELS=llama-3.1-8b-ld
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - ld-network
    depends_on:
      - litellm

volumes:
  open-webui-data:

networks:
  ld-network:
    driver: bridge
