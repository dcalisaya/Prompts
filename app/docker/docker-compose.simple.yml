# Live Developer - Stack Simple con PostgreSQL para LiteLLM

services:
  # PostgreSQL para LiteLLM
  postgres:
    image: postgres:15-alpine
    container_name: ld-postgres
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ld-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 5

  # LiteLLM Proxy
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ld-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.local.yaml:/app/config.yaml
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DATABASE_URL=postgresql://litellm:litellm@postgres:5432/litellm
    command: >
      --config /app/config.yaml
      --port 4000
    restart: unless-stopped
    networks:
      - ld-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Open WebUI
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ld-openwebui
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OPENAI_API_BASE=http://litellm:4000/v1
      - ENABLE_SIGNUP=true
      - DEFAULT_LOCALE=es
      - DEFAULT_MODELS=llama-3.1-8b-ld
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - ld-network
    depends_on:
      - litellm

volumes:
  postgres-data:
  open-webui-data:

networks:
  ld-network:
    driver: bridge
