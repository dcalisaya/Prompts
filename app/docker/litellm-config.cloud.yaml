# LiteLLM Configuration - Cloud-Only
# Sin modelos locales, solo APIs pagadas

model_list:
  # OpenAI Models
  - model_name: gpt-4o-ld
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
      timeout: 60
      max_tokens: 4096
      temperature: 0.7
    model_info:
      mode: chat
      description: "GPT-4o - Modelo principal para razonamiento y estrategia"
      input_cost_per_token: 0.0000025
      output_cost_per_token: 0.00001

  - model_name: gpt-4o-mini-ld
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
      timeout: 30
      max_tokens: 4096
      temperature: 0.7
    model_info:
      mode: chat
      description: "GPT-4o Mini - Económico para tareas simples"
      input_cost_per_token: 0.00000015
      output_cost_per_token: 0.0000006

  - model_name: o3-mini-ld
    litellm_params:
      model: openai/o3-mini
      api_key: os.environ/OPENAI_API_KEY
      timeout: 120
      max_tokens: 4096
      # o3-mini usa reasoning_effort en lugar de temperature
      extra_body:
        reasoning_effort: medium
    model_info:
      mode: chat
      description: "o3 Mini - Razonamiento avanzado (Codex-like)"
      input_cost_per_token: 0.0000011
      output_cost_per_token: 0.0000044

  - model_name: o1-ld
    litellm_params:
      model: openai/o1
      api_key: os.environ/OPENAI_API_KEY
      timeout: 120
      max_tokens: 4096
    model_info:
      mode: chat
      description: "o1 - Razonamiento complejo (más caro)"

  # Anthropic Models
  - model_name: claude-sonnet-ld
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY
      timeout: 60
      max_tokens: 4096
      temperature: 0.7
    model_info:
      mode: chat
      description: "Claude 3.5 Sonnet - Excelente para código y análisis"
      input_cost_per_token: 0.000003
      output_cost_per_token: 0.000015

  - model_name: claude-haiku-ld
    litellm_params:
      model: anthropic/claude-3-5-haiku-20241022
      api_key: os.environ/ANTHROPIC_API_KEY
      timeout: 30
      max_tokens: 4096
      temperature: 0.7
    model_info:
      mode: chat
      description: "Claude 3.5 Haiku - Rápido y económico"
      input_cost_per_token: 0.000001
      output_cost_per_token: 0.000005

  # OpenRouter (alternativa para acceso a múltiples modelos con una API key)
  - model_name: deepseek-coder-ld
    litellm_params:
      model: openrouter/deepseek/deepseek-coder
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 60
    model_info:
      mode: chat
      description: "DeepSeek Coder - Alternativa económica para código"

# Configuración de router
router_settings:
  # Routing strategy
  routing_strategy: simple-shuffle
  
  # Rate limits
  rate_limit:
    - model: gpt-4o-ld
      tpm: 100000  # tokens por minuto
      rpm: 100     # requests por minuto

# Budget tracking (opcional)
budget:
  # Presupuesto máximo por mes (en USD)
  max_budget: 500.0
  
# Logging de uso
general_settings:
  master_key: ${LITELLM_MASTER_KEY:-sk-ld-cloud}
  database_url: sqlite:///app/data/litellm.db
  
  # Tracking de spend por usuario
  user_budget: 50.0  # Default budget per user
  
# Callbacks para monitoreo
litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
